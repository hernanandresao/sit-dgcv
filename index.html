<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIT-DGCV | Control de Proyectos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">SIT <span>DGCV</span></div>
        <nav>
            <button class="btn-nav" onclick="cambiarSeccion('dashboard')">Dashboard</button>
            <button class="btn-nav" onclick="cambiarSeccion('proyectos')">Proyectos</button>
            <button class="btn-nav" onclick="cambiarSeccion('empresas')">Empresas</button>
        </nav>
    </header>

    <main id="app">
        <section id="sec-dashboard" class="seccion">
            <div class="stats">
                <div class="card-stat"><h3>Proyectos</h3><p id="total-proyectos">0</p></div>
                <div class="card-stat"><h3>Empresas</h3><p id="total-empresas">0</p></div>
            </div>
            <div class="card">
                <h2>Obras Recientes</h2>
                <div id="lista-recientes">Cargando datos...</div>
            </div>
        </section>

        <section id="sec-proyectos" class="seccion" style="display:none;">
            <div class="header-accion">
                <h2>Gestión de Carreteras</h2>
                <button class="btn-primary" onclick="abrirModal('modal-proyecto')">+ Nuevo Proyecto</button>
            </div>
            <table class="tabla">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre del Proyecto</th>
                        <th>Avance</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-proyectos-body"></tbody>
            </table>
        </section>

        <section id="sec-empresas" class="seccion" style="display:none;">
            <div class="header-accion">
                <h2>Empresas Precalificadas</h2>
                <button class="btn-primary" onclick="abrirModal('modal-empresa')">+ Nueva Empresa</button>
            </div>
            <table class="tabla">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>RTN</th>
                        <th>Tipo</th>
                    </tr>
                </thead>
                <tbody id="tabla-empresas-body"></tbody>
            </table>
        </section>
    </main>

    <div id="modal-proyecto" class="modal">
        <div class="modal-content">
            <h3>Registrar Nuevo Proyecto</h3>
            <form id="form-proyecto">
                <input type="text" id="p-nombre" placeholder="Nombre de la obra" required>
                <input type="text" id="p-codigo" placeholder="Código (Ej: RN-25)" required>
                <input type="number" id="p-avance" placeholder="% Avance Físico" min="0" max="100">
                <select id="p-estado">
                    <option value="Licitación">Licitación</option>
                    <option value="Ejecución">Ejecución</option>
                    <option value="Finalizado">Finalizado</option>
                </select>
                <div class="modal-btns">
                    <button type="button" onclick="cerrarModal('modal-proyecto')">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Proyecto</button>
                </div>
            </form>
        </div>
    </div>

    <script src="controlador.js"></script>
</body>
</html>
